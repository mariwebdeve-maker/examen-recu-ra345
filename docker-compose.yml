version: '3.8'

services:
  postgres_db:
    image: postgres:16
    container_name: ${DB_CONTAINER_NAME}
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT_EXTERNAL}:${DB_PORT_INTERNAL}"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  springboot_api:
    # IMPORTANTE: Cambia 'tu_usuario_github' por tu nombre real de usuario de GitHub
    image: ghcr.io/tu_usuario_github/examen-recu345:latest
    container_name: springboot_api
    restart: always
    depends_on:
      - postgres_db
    ports:
      - "8080:8080"
    environment:
      # Spring usa estas variables para sobreescribir el application.properties
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres_db:${DB_PORT_INTERNAL}/${DB_NAME}
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}

volumes:
  postgres_data:
